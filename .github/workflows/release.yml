# PyPI release via trusted publishing (OIDC — no API tokens).
#
# Fires when a v* tag is pushed, or on a manual dispatch from the Actions tab.
# Requires a trusted publisher to be configured for the khatt project on PyPI
# (Account → Publishing): owner DrEssam97, repo khatt, workflow release.yml,
# environment pypi.

name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # trusted publishing (OIDC), no API token needed
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
